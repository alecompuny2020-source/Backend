{% extends "emails/base_email.html" %}
{% block content %}
    <h2>{{ greeting }},</h2>
    <p>Your <strong>{{ token_type }}</strong> verification code is:</p>
    <div style="background: #f1f5f9; padding: 20px; font-size: 32px; font-weight: bold; text-align: center; color: #2563eb; letter-spacing: 5px;">
        {{ otp_code }}
    </div>
    <p>This code is valid for <strong>{{ expiration_min }} minutes</strong>.</p>
    <p>If you did not request this, please ignore this email.</p>
{% endblock %}
