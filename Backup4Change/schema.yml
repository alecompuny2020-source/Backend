openapi: 3.0.3
info:
  title: ''
  version: 1.0.0
paths:
  /api/auth/confirm-forgot-password/:
    post:
      operationId: auth_confirm_forgot_password_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordConfirm'
          description: ''
  /api/auth/confirm-registration/:
    post:
      operationId: auth_confirm_registration_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConfirmRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConfirmRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmRegistration'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequestOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequestOTPRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginRequestOTP'
          description: ''
  /api/auth/login/verify-otp/:
    post:
      operationId: auth_login_verify_otp_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginConfirmOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginConfirmOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginConfirmOTPRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginConfirmOTP'
          description: ''
  /api/auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Password reset view that verify OTP for password reset and set
        a new Password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConfirmPasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConfirmPasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPasswordReset'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Attains self user registration
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
  /api/auth/request-forgot-link/:
    post:
      operationId: auth_request_forgot_link_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RequestForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RequestForgotPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestForgotPassword'
          description: ''
  /api/auth/request/login-otp/:
    post:
      operationId: auth_request_login_otp_create
      description: Generic base class for requesting various OTP types.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestOTP'
          description: ''
  /api/auth/request/password-reset-otp/:
    post:
      operationId: auth_request_password_reset_otp_create
      description: Generic base class for requesting various OTP types.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestOTP'
          description: ''
  /api/auth/request/registration-otp/:
    post:
      operationId: auth_request_registration_otp_create
      description: Generic base class for requesting various OTP types.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RequestOTPRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestOTP'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    ConfirmPasswordReset:
      type: object
      description: |-
        Confirms password reset: Validates OTP and sets the new password.
        Requires OTP code and new password.
      properties:
        identifier:
          type: string
        OTP:
          type: string
          maxLength: 6
      required:
      - OTP
      - identifier
    ConfirmPasswordResetRequest:
      type: object
      description: |-
        Confirms password reset: Validates OTP and sets the new password.
        Requires OTP code and new password.
      properties:
        identifier:
          type: string
          minLength: 1
        OTP:
          type: string
          minLength: 1
          maxLength: 6
        new_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - OTP
      - identifier
      - new_password
    ConfirmRegistration:
      type: object
      properties:
        identifier:
          type: string
        OTP:
          type: string
          maxLength: 6
      required:
      - OTP
      - identifier
    ConfirmRegistrationRequest:
      type: object
      properties:
        identifier:
          type: string
          minLength: 1
        OTP:
          type: string
          minLength: 1
          maxLength: 6
      required:
      - OTP
      - identifier
    ForgotPasswordConfirm:
      type: object
      description: confirm forgot password reset using either identifier.
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    ForgotPasswordConfirmRequest:
      type: object
      description: confirm forgot password reset using either identifier.
      properties:
        new_password:
          type: string
          writeOnly: true
          minLength: 1
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
        uid:
          type: string
          minLength: 1
        token:
          type: string
          minLength: 1
      required:
      - confirm_password
      - new_password
      - token
      - uid
    LoginConfirmOTP:
      type: object
      description: 'Step 2 of 2FA: Verify OTP against the user identified by email
        or phone number.'
      properties:
        identifier:
          type: string
        OTP:
          type: string
          maxLength: 6
      required:
      - OTP
      - identifier
    LoginConfirmOTPRequest:
      type: object
      description: 'Step 2 of 2FA: Verify OTP against the user identified by email
        or phone number.'
      properties:
        identifier:
          type: string
          minLength: 1
        OTP:
          type: string
          minLength: 1
          maxLength: 6
      required:
      - OTP
      - identifier
    LoginRequestOTP:
      type: object
      description: 'Step 1 of 2FA: Accept either email or phone and send OTP.'
      properties:
        identifier:
          type: string
      required:
      - identifier
    LoginRequestOTPRequest:
      type: object
      description: 'Step 1 of 2FA: Accept either email or phone and send OTP.'
      properties:
        identifier:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - identifier
      - password
    Registration:
      type: object
      description: Performs self-user registration (for customers) and generates the
        initial OTP.
      properties:
        email:
          type: string
          format: email
          nullable: true
          title: Email Address
          maxLength: 254
        phone_number:
          type: string
          nullable: true
          maxLength: 128
        first_name:
          type: string
          maxLength: 30
        last_name:
          type: string
          maxLength: 100
      required:
      - first_name
      - last_name
    RegistrationRequest:
      type: object
      description: Performs self-user registration (for customers) and generates the
        initial OTP.
      properties:
        email:
          type: string
          format: email
          nullable: true
          minLength: 1
          title: Email Address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 1
          maxLength: 128
        phone_number:
          type: string
          nullable: true
          minLength: 1
          maxLength: 128
        first_name:
          type: string
          minLength: 1
          maxLength: 30
        last_name:
          type: string
          minLength: 1
          maxLength: 100
      required:
      - first_name
      - last_name
      - password
    RequestForgotPassword:
      type: object
      description: Initiates password reset using either identifier.
      properties:
        identifier:
          type: string
      required:
      - identifier
    RequestForgotPasswordRequest:
      type: object
      description: Initiates password reset using either identifier.
      properties:
        identifier:
          type: string
          minLength: 1
      required:
      - identifier
    RequestOTP:
      type: object
      description: Initiates password reset by sending an OTP to either phone number
        or email.
      properties:
        identifier:
          type: string
      required:
      - identifier
    RequestOTPRequest:
      type: object
      description: Initiates password reset by sending an OTP to either phone number
        or email.
      properties:
        identifier:
          type: string
          minLength: 1
      required:
      - identifier
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
